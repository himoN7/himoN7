<svg width="1280" height="620" viewBox="0 0 1280 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fluent inspired GitHub profile hero for Hamed Rezaei Adaryani</title>
  <desc id="desc">A soft Fluent 2 inspired interface with side navigation, a large profile title, translucent glass cubes, and rounded design and develop cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF9F8"/>
      <stop offset="0.45" stop-color="#F6F3F7"/>
      <stop offset="1" stop-color="#EDF7FA"/>
    </linearGradient>
    <linearGradient id="cyan" x1="688" y1="86" x2="975" y2="267" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A9F5FF" stop-opacity="0.92"/>
      <stop offset="0.45" stop-color="#B8A7FF" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#FFF5C3" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="pink" x1="759" y1="190" x2="1044" y2="386" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD8E9" stop-opacity="0.96"/>
      <stop offset="0.5" stop-color="#FF5CAD" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#A5F3FF" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="green" x1="714" y1="322" x2="974" y2="508" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D9FFF0" stop-opacity="0.96"/>
      <stop offset="0.48" stop-color="#7CFFB1" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#B6D7FF" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="accent" x1="394" y1="219" x2="615" y2="219" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F6CBD"/>
      <stop offset="0.45" stop-color="#00B7C3"/>
      <stop offset="1" stop-color="#7F52FF"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#201F1E" flood-opacity="0.14"/>
    </filter>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
  </defs>

  <rect width="1280" height="620" rx="36" fill="url(#bg)"/>
  <circle cx="888" cy="395" r="198" fill="#00B7C3" opacity="0.13" filter="url(#soft)"/>
  <circle cx="564" cy="430" r="210" fill="#FFB900" opacity="0.12" filter="url(#soft)"/>
  <circle cx="820" cy="158" r="174" fill="#7F52FF" opacity="0.11" filter="url(#soft)"/>

  <path d="M759 70L1106 270" stroke="#FFFFFF" stroke-width="4" stroke-opacity="0.82"/>
  <path d="M720 119L1047 500" stroke="#FFFFFF" stroke-width="4" stroke-opacity="0.72"/>
  <path d="M642 78L394 395" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.42"/>
  <path d="M1004 90L682 478" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.5"/>

  <g filter="url(#shadow)">
    <rect x="0" y="0" width="244" height="620" fill="#FFFFFF" fill-opacity="0.78"/>
    <rect x="38" y="40" width="28" height="28" rx="5" fill="#242424"/>
    <path d="M72 42L90 52.5L72 63V42Z" fill="#616161"/>
