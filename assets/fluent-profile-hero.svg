    <text x="57" y="348" fill="#A4262C" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Windows</text>
    <text x="58" y="414" fill="#605E5C" font-family="Segoe UI, Arial, sans-serif" font-size="12">Overview</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="345" y="106" fill="#323130" font-size="18" font-weight="800" letter-spacing="8">WELCOME TO</text>
    <text x="343" y="205" fill="#11100F" font-size="82" font-weight="800">Hamed</text>
    <text x="343" y="286" fill="#11100F" font-size="62" font-weight="760">Let the </text>
    <text x="553" y="286" fill="url(#accent)" font-size="62" font-weight="760">@ideas</text>
    <text x="733" y="286" fill="#11100F" font-size="62" font-weight="760"> flow</text>
    <rect x="344" y="326" width="178" height="43" rx="21.5" fill="#000000"/>
    <text x="377" y="354" fill="#FFFFFF" font-size="16" font-weight="700">Explore my work</text>
  </g>

  <g filter="url(#shadow)" opacity="0.98">
    <path d="M910 64L1030 126L910 188L790 126L910 64Z" fill="url(#cyan)" stroke="#FFFFFF" stroke-width="3"/>
    <path d="M790 126L910 188V267L790 204V126Z" fill="#9BE8FF" fill-opacity="0.34" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="2"/>
    <path d="M1030 126L910 188V267L1030 205V126Z" fill="#8D82FF" fill-opacity="0.24" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="2"/>
  </g>
