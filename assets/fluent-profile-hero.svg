    <path d="M836 481L848 491L836 501" stroke="#0F6CBD" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M828 476L820 506" stroke="#13A10E" stroke-width="5" stroke-linecap="round"/>
    <rect x="804" y="467" width="40" height="48" rx="8" stroke="#7F52FF" stroke-width="3" stroke-dasharray="7 7"/>
    <text x="888" y="485" fill="#242424" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="760">Develop</text>
    <text x="888" y="516" fill="#605E5C" font-family="Segoe UI, Arial, sans-serif" font-size="17">.NET MAUI, WinUI, Python ML</text>
