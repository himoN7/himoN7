    <path d="M1054 388L925 456V542L1054 474V388Z" fill="#B4D7FF" fill-opacity="0.28" stroke="#FFFFFF" stroke-opacity="0.75" stroke-width="2"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="344" y="432" width="386" height="118" rx="22" fill="#FFFFFF" fill-opacity="0.82" stroke="#FFFFFF" stroke-width="2"/>
    <rect x="382" y="461" width="60" height="60" rx="14" fill="#F5F5F5"/>
    <path d="M398 506L424 480" stroke="#0F6CBD" stroke-width="8" stroke-linecap="round"/>
    <path d="M403 477C412 467 429 470 430 486" stroke="#D83B01" stroke-width="6" stroke-linecap="round"/>
    <path d="M414 514C435 514 448 498 448 479" stroke="#00B7C3" stroke-width="6" stroke-linecap="round"/>
    <text x="476" y="485" fill="#242424" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="760">Design</text>
    <text x="476" y="516" fill="#605E5C" font-family="Segoe UI, Arial, sans-serif" font-size="17">UI systems, graphics, tokens</text>
  </g>

  <g filter="url(#shadow)">
