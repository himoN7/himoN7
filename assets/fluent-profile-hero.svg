      <text x="56" y="213">UX frameworks</text>
      <text x="56" y="257">Working with AI</text>
      <text x="56" y="301">Web tokens</text>
      <text x="56" y="389">Components</text>
    </g>
    <g stroke="#8A8886" stroke-width="2" stroke-linecap="round">
      <path d="M35 120L40 125L35 130"/>
      <path d="M35 164L40 169L35 174"/>
      <path d="M35 208L40 213L35 218"/>
      <path d="M35 252L40 257L35 262"/>
